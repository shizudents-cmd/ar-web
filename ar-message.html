<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Message — QRで動画と3Dメッセージを届ける</title>
<style>
  :root{
    --bg:#0e1220; --card:#171c2e; --ink:#eef1f8; --sub:#9aa3bd;
    --accent:#5b8cff; --accent2:#9b6bff; --line:#2a3148; --ok:#3ddc97;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%,#1c2440 0%,transparent 60%),var(--bg);
    color:var(--ink);overflow-x:hidden}
  .wrap{max-width:520px;margin:0 auto;padding:22px 18px 60px}
  header.brand{display:flex;align-items:center;gap:10px;margin:6px 0 16px}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-size:20px}
  h1{font-size:18px;margin:0}
  .sub{color:var(--sub);font-size:12.5px;margin-top:2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}
  label{display:block;font-size:13px;color:var(--sub);margin:14px 0 7px}
  label:first-child{margin-top:0}
  input,textarea{width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--line);
    background:#0f1424;color:var(--ink);font-size:15px;outline:none;font-family:inherit}
  textarea{min-height:120px;resize:vertical;line-height:1.6}
  input:focus,textarea:focus{border-color:var(--accent)}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:0;
    border-radius:12px;font-size:15.5px;font-weight:600;cursor:pointer;margin-top:12px;color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .btn.secondary{background:#222a42;border:1px solid var(--line)}
  .btn:active{transform:translateY(1px)}
  .row{display:flex;gap:10px}
  .row .btn{margin-top:0}
  .opts{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-top:6px}
  .opt{display:flex;align-items:center;gap:7px;font-size:13.5px;color:#c7cde0}
  .opt input{width:auto}
  #qrbox{display:none;text-align:center;margin-top:18px}
  #qr{display:inline-block;background:#fff;padding:16px;border-radius:14px}
  #qr img,#qr canvas{display:block}
  #linkBox{font-size:11.5px;color:var(--sub);margin-top:10px;word-break:break-all}
  .hint{font-size:12.5px;color:var(--sub);line-height:1.7;margin-top:12px}
  .pill{display:inline-block;font-size:11px;color:var(--ok);border:1px solid #244b3c;background:#10241c;
    padding:3px 9px;border-radius:999px;margin-bottom:6px}
  .hidden{display:none!important}

  /* ===== 体験画面 ===== */
  #show{position:fixed;inset:0;z-index:50;background:#000;display:none;overflow:hidden}
  #bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:linear-gradient(160deg,#10142a,#241a3a)}
  #scene{position:absolute;inset:0;perspective:900px;perspective-origin:50% 45%}
  #telop{position:absolute;inset:0;transform-style:preserve-3d}
  .msg{position:absolute;left:50%;top:46%;width:90%;max-width:520px;text-align:center;
    font-weight:800;font-size:34px;line-height:1.35;letter-spacing:.5px;opacity:0;
    color:#fff;background:linear-gradient(180deg,#ffffff,#bcd0ff);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 0 rgba(40,70,160,.55)) drop-shadow(0 0 18px rgba(120,160,255,.55));
    transform:translate(-50%,-50%) translateZ(-700px) translateY(50px) rotateX(22deg)}
  .msg.run{animation:flow var(--dur,4.2s) cubic-bezier(.2,.7,.25,1) forwards}
  @keyframes flow{
    0%{opacity:0;transform:translate(-50%,-50%) translateZ(-700px) translateY(60px) rotateX(22deg) scale(.6)}
    16%{opacity:1}
    78%{opacity:1}
    100%{opacity:0;transform:translate(-50%,-50%) translateZ(380px) translateY(-200px) rotateX(22deg) scale(1.25)}
  }
  #videoWrap{position:absolute;left:50%;bottom:13%;transform:translateX(-50%) rotateX(8deg);
    width:78vw;max-width:460px;aspect-ratio:16/9;border-radius:14px;overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.55);border:2px solid rgba(150,180,255,.5);display:none;background:#000}
  #videoWrap iframe,#videoWrap video{width:100%;height:100%;border:0;display:block;object-fit:cover}
  #videoWrap.portrait{aspect-ratio:9/16;width:60vw;max-width:300px;bottom:9%}
  #videoWrap.portrait iframe{background:#fff}
  #showBar{position:absolute;left:0;right:0;bottom:0;z-index:60;display:flex;gap:10px;padding:14px;
    background:linear-gradient(0deg,rgba(8,10,18,.85),transparent);pointer-events:none}
  #showBar .btn{margin-top:0;pointer-events:auto}
  #startOverlay{position:absolute;inset:0;z-index:70;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;gap:6px;
    background:radial-gradient(800px 600px at 50% 30%,#1a2046,#0a0d18)}
  #startOverlay .em{font-size:46px}
  #startOverlay h2{margin:8px 0 0;font-size:20px}
  #startOverlay p{color:var(--sub);font-size:13.5px;line-height:1.7;margin:6px 0 0}
</style>
</head>
<body>

<!-- ===================== 作成画面 ===================== -->
<div class="wrap" id="home">
  <header class="brand">
    <div class="logo">🎬</div>
    <div>
      <h1>AR Message</h1>
      <div class="sub">QRを読むと、動画と3Dメッセージが空間に流れる</div>
    </div>
  </header>

  <div class="card">
    <span class="pill">● 動画 ＋ 流れる3Dテロップ</span>
    <label for="msgs">メッセージ（1行＝1つのテロップ・上から順に流れます）</label>
    <textarea id="msgs" placeholder="おめでとう！&#10;いつもありがとう&#10;これからもよろしくね"></textarea>

    <label for="video">動画リンク（YouTube / Instagram / TikTok / Vimeo / mp4・空欄でもOK）</label>
    <input id="video" type="url" inputmode="url" placeholder="https://youtu.be/..." autocomplete="off">

    <div class="opts">
      <span class="opt"><input type="checkbox" id="loop" checked> テロップを繰り返す</span>
      <span class="opt">速さ
        <select id="speed" style="margin-left:4px;padding:6px 8px;border-radius:8px;background:#0f1424;color:#eef1f8;border:1px solid var(--line)">
          <option value="5.2">ゆっくり</option>
          <option value="4.2" selected>標準</option>
          <option value="3.2">速い</option>
        </select>
      </span>
    </div>

    <button class="btn" id="previewBtn">プレビュー再生</button>
    <button class="btn secondary" id="makeBtn">QRコード / 共有リンクを作成</button>

    <div id="qrbox">
      <div id="qr"></div>
      <div id="linkBox"></div>
      <div class="row" style="margin-top:14px">
        <button class="btn secondary" id="copyBtn">リンクをコピー</button>
        <button class="btn secondary" id="printBtn">QRを印刷</button>
      </div>
    </div>
  </div>

  <div class="card">
    <label style="margin:0 0 8px">ポイント</label>
    <p class="hint" style="margin-top:0">
      QRは“起動するだけ”。読み取ったら端末を自由に動かせ、ずっとかざし続ける必要はありません。<br>
      動画は自分のリンクを使うので、サイト埋め込み制限の影響を受けにくくなります（YouTube等の埋め込み可能な動画を推奨）。
    </p>
  </div>
</div>

<!-- ===================== 体験画面 ===================== -->
<div id="show">
  <video id="bg" playsinline muted></video>
  <div id="scene">
    <div id="telop"></div>
    <div id="videoWrap"></div>
  </div>
  <div id="showBar">
    <button class="btn secondary" id="showBack" style="flex:0 0 36%">← 戻る</button>
    <button class="btn" id="replayBtn">もう一度</button>
  </div>
  <div id="startOverlay">
    <div class="em">✨</div>
    <h2 id="startTitle">メッセージを再生</h2>
    <p>タップすると、カメラ越しの空間に<br>動画とメッセージが流れます。</p>
    <button class="btn" id="reallyStart" style="max-width:280px">タップして開始</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
<script>
(function(){
  "use strict";
  var $=function(s){return document.querySelector(s);};

  function baseUrl(){ return location.origin+location.pathname; }

  /* ---------- 入力 → 設定オブジェクト ---------- */
  function readConfig(){
    var msgs=$("#msgs").value.split("\n").map(function(s){return s.trim();}).filter(Boolean);
    return {
      m:msgs,
      v:($("#video").value||"").trim(),
      loop:$("#loop").checked?1:0,
      dur:$("#speed").value
    };
  }
  function configToHash(c){
    var p=new URLSearchParams();
    p.set("m",c.m.join("|"));
    if(c.v) p.set("v",c.v);
    p.set("loop",c.loop);
    p.set("dur",c.dur);
    return "#show?"+p.toString();
  }
  function parseHash(){
    var h=location.hash||"";
    if(h.indexOf("#show")!==0) return null;
    var p=new URLSearchParams(h.split("?")[1]||"");
    return {
      m:(p.get("m")||"").split("|").map(function(s){return s.trim();}).filter(Boolean),
      v:p.get("v")||"",
      loop:p.get("loop")==="1",
      dur:parseFloat(p.get("dur")||"4.2")
    };
  }

  /* ---------- 動画URL判定 ---------- */
  function videoEmbed(url){
    if(!url) return null;
    var yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([\w-]{6,})/);
    if(yt) return {type:"iframe",src:"https://www.youtube.com/embed/"+yt[1]+"?playsinline=1&rel=0&autoplay=1&modestbranding=1"};
    var ig=url.match(/instagram\.com\/(p|reel|reels|tv)\/([\w-]+)/);
    if(ig){ var kind=(ig[1]==="reels")?"reel":ig[1];
      return {type:"iframe",src:"https://www.instagram.com/"+kind+"/"+ig[2]+"/embed/",portrait:true}; }
    var tk=url.match(/tiktok\.com\/.*\/video\/(\d+)/);
    if(tk) return {type:"iframe",src:"https://www.tiktok.com/embed/v2/"+tk[1],portrait:true};
    var vm=url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
    if(vm) return {type:"iframe",src:"https://player.vimeo.com/video/"+vm[1]+"?autoplay=1&playsinline=1"};
    if(/\.(mp4|webm|ogg|mov|m4v)(\?.*)?$/i.test(url)) return {type:"video",src:url};
    // 不明なURLはiframeで試す
    return {type:"iframe",src:url};
  }

  /* ---------- QR / リンク ---------- */
  function makeQR(){
    var c=readConfig();
    if(!c.m.length && !c.v){ $("#msgs").focus(); return; }
    var link=baseUrl()+configToHash(c);
    $("#qr").innerHTML="";
    new QRCode($("#qr"),{text:link,width:240,height:240,correctLevel:QRCode.CorrectLevel.L});
    $("#linkBox").textContent=link;
    $("#qrbox").style.display="block";
    $("#qrbox").dataset.link=link;
    if(link.length>900){
      $("#linkBox").textContent=link+"  ⚠ 文字数が多くQRが読み取りにくい場合があります。メッセージを短めにするか、リンク共有をご利用ください。";
    }
  }
  function copyLink(){
    var link=$("#qrbox").dataset.link||"";
    if(!link) return;
    if(navigator.clipboard) navigator.clipboard.writeText(link).then(function(){
      $("#copyBtn").textContent="コピーしました"; setTimeout(function(){$("#copyBtn").textContent="リンクをコピー";},1500);
    });
  }
  function printQR(){
    var c=$("#qr").querySelector("canvas"); var img=$("#qr").querySelector("img");
    var d=c?c.toDataURL("image/png"):(img?img.src:""); if(!d) return;
    var w=window.open("","_blank");
    w.document.write('<html><head><title>QR</title></head><body style="text-align:center;font-family:sans-serif;padding:40px">'+
      '<img src="'+d+'" style="width:320px;height:320px">'+
      '<scr'+'ipt>window.onload=function(){window.print();}<\/scr'+'ipt></body></html>');
    w.document.close();
  }

  $("#makeBtn").addEventListener("click",makeQR);
  $("#copyBtn").addEventListener("click",copyLink);
  $("#printBtn").addEventListener("click",printQR);
  $("#previewBtn").addEventListener("click",function(){
    var c=readConfig();
    if(!c.m.length && !c.v){ $("#msgs").focus(); return; }
    startExperience({m:c.m,v:c.v,loop:!!c.loop,dur:parseFloat(c.dur)});
  });

  /* ================= 体験 ================= */
  var bg=$("#bg"), telop=$("#telop"), videoWrap=$("#videoWrap"),
      scene=$("#show"), startOverlay=$("#startOverlay");
  var stream=null, cfg=null, timer=null, idx=0;

  function startExperience(c){
    cfg=c;
    $("#home").style.display="none";
    scene.style.display="block";
    startOverlay.style.display="flex";
    $("#startTitle").textContent = c.m.length? c.m[0] : "メッセージを再生";
  }

  $("#reallyStart").addEventListener("click",beginPlayback);
  $("#showBack").addEventListener("click",stopExperience);
  $("#replayBtn").addEventListener("click",function(){ idx=0; runTelop(); });

  function beginPlayback(){
    startOverlay.style.display="none";
    // カメラ背景（失敗してもグラデ背景で続行）
    if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
      navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}},audio:false})
        .then(function(s){ stream=s; bg.srcObject=s; bg.play().catch(function(){}); })
        .catch(function(){ /* カメラ無しでも続行 */ });
    }
    // 動画
    var emb=videoEmbed(cfg.v);
    videoWrap.innerHTML="";
    if(emb){
      videoWrap.classList.toggle("portrait", !!emb.portrait);
      if(emb.type==="iframe"){
        var f=document.createElement("iframe");
        f.setAttribute("allow","autoplay;encrypted-media;picture-in-picture;fullscreen");
        f.setAttribute("allowfullscreen","");
        f.setAttribute("scrolling","no");
        f.src=emb.src; videoWrap.appendChild(f);
      }else{
        var v=document.createElement("video");
        v.src=emb.src; v.setAttribute("playsinline",""); v.controls=true; v.autoplay=true;
        videoWrap.appendChild(v);
        v.play().catch(function(){});
      }
      videoWrap.style.display="block";
    }else{
      videoWrap.style.display="none";
    }
    // テロップ
    idx=0; runTelop();
  }

  function runTelop(){
    if(timer){ clearTimeout(timer); timer=null; }
    telop.innerHTML="";
    if(!cfg.m.length) return;
    var step=Math.max(1600, cfg.dur*1000*0.72); // 重なりながら次へ
    function next(){
      if(idx>=cfg.m.length){
        if(cfg.loop){ idx=0; } else { return; }
      }
      var el=document.createElement("div");
      el.className="msg";
      el.style.setProperty("--dur", cfg.dur+"s");
      el.textContent=cfg.m[idx];
      telop.appendChild(el);
      // reflow→アニメ開始
      void el.offsetWidth;
      el.classList.add("run");
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, cfg.dur*1000+200);
      idx++;
      timer=setTimeout(next, step);
    }
    next();
  }

  function stopExperience(){
    if(timer){ clearTimeout(timer); timer=null; }
    if(stream){ stream.getTracks().forEach(function(t){t.stop();}); stream=null; }
    videoWrap.innerHTML=""; videoWrap.style.display="none";
    telop.innerHTML="";
    scene.style.display="none";
    if(location.hash.indexOf("#show")===0){ history.replaceState(null,"",baseUrl()); }
    $("#home").style.display="block";
  }

  /* ---------- 起動時：QRから来たら自動で体験へ ---------- */
  var fromHash=parseHash();
  if(fromHash && (fromHash.m.length || fromHash.v)){
    startExperience({m:fromHash.m, v:fromHash.v, loop:fromHash.loop, dur:fromHash.dur});
  }
})();
</script>
</body>
</html>
